
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>言之有品 · 评论分析大屏</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
<style>
  :root {
    --primary: #4f8ef7;
    --good: #34c38f;
    --bad: #f46a6a;
    --warn: #f1b44c;
    --bg: #f4f7fe;
    --card: #ffffff;
    --text: #2d3748;
    --sub: #718096;
    --border: #e2e8f0;
    --shadow: 0 2px 16px rgba(79,142,247,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); font-family: 'Microsoft YaHei', '微软雅黑', sans-serif; color: var(--text); min-height: 100vh; }

  /* ── 顶部 Header ── */
.header {
    background: linear-gradient(rgba(0,0,0,0.25), rgba(0,0,0,0.25)),
                url('bg.jpg') center/cover no-repeat;
    color: white; padding: 28px 40px;
    display: flex; align-items: center; justify-content: space-between;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
}
  .header-left h1 { font-size: 26px; font-weight: 700; letter-spacing: 2px; }
  .header-left p  { font-size: 13px; opacity: .8; margin-top: 4px; }
  .header-right   { font-size: 13px; opacity: .75; text-align: right; }

  /* ── 产品选择 Tab ── */
  .tab-bar {
    display: flex; gap: 12px; padding: 20px 40px 0;
    flex-wrap: wrap;
  }
  .tab-btn {
    padding: 8px 22px; border-radius: 24px; border: 2px solid var(--primary);
    background: white; color: var(--primary); cursor: pointer;
    font-size: 14px; font-weight: 600; transition: all .2s;
  }
  .tab-btn.active, .tab-btn:hover {
    background: var(--primary); color: white;
  }

  /* ── 主内容 ── */
  .main { padding: 24px 40px 40px; }

  /* ── 概览卡片行 ── */
  .overview-row {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px;
  }
  .ov-card {
    background: var(--card); border-radius: 16px; padding: 20px 24px;
    box-shadow: var(--shadow); border-left: 5px solid var(--primary);
    display: flex; flex-direction: column; gap: 6px;
  }
  .ov-card.green  { border-left-color: var(--good); }
  .ov-card.red    { border-left-color: var(--bad); }
  .ov-card.yellow { border-left-color: var(--warn); }
  .ov-card .label { font-size: 13px; color: var(--sub); }
  .ov-card .value { font-size: 30px; font-weight: 700; color: var(--text); }
  .ov-card .unit  { font-size: 13px; color: var(--sub); }

  /* ── 图表行 ── */
  .chart-row {
    display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px;
  }
  .chart-row.three {
    grid-template-columns: 1fr 1fr 1fr;
  }
  .card {
    background: var(--card); border-radius: 16px; padding: 24px;
    box-shadow: var(--shadow);
  }
  .card h3 {
    font-size: 15px; font-weight: 700; color: var(--text);
    margin-bottom: 16px; padding-bottom: 10px;
    border-bottom: 2px solid var(--bg);
    display: flex; align-items: center; gap: 8px;
  }
  .chart-wrap { position: relative; height: 240px; }
  .chart-wrap-tall { position: relative; height: 300px; }

  /* ── 关键词气泡 ── */
  .kw-cloud {
    display: flex; flex-wrap: wrap; gap: 8px; padding-top: 4px;
  }
  .kw-tag {
    padding: 4px 14px; border-radius: 20px; font-size: 13px; font-weight: 600;
    cursor: default; transition: transform .15s;
  }
  .kw-tag:hover { transform: scale(1.08); }
  .kw-good { background: #e6f9f2; color: #1a7a56; }
  .kw-bad  { background: #fff0f0; color: #c0392b; }

  /* ── 建议区域 ── */
  .suggestion-box {
    background: linear-gradient(135deg, #f0f4ff 0%, #faf0ff 100%);
    border: 1px solid #d0d8ff; border-radius: 16px; padding: 28px 32px;
    line-height: 1.9; font-size: 14px; white-space: pre-wrap;
    box-shadow: var(--shadow);
  }
  .suggestion-box strong { color: var(--primary); }

  /* ── 词云图 ── */
  .wc-row {
    display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px;
  }
  .wc-img-wrap {
    background: var(--card); border-radius: 16px; padding: 24px;
    box-shadow: var(--shadow); text-align: center;
  }
  .wc-img-wrap h3 {
    font-size: 15px; font-weight: 700; margin-bottom: 14px;
    padding-bottom: 10px; border-bottom: 2px solid var(--bg);
  }
  .wc-img-wrap img {
    max-width: 100%; border-radius: 10px;
    border: 1px solid var(--border);
  }
  .wc-img-wrap .no-img {
    color: var(--sub); font-size: 13px; padding: 40px 0;
  }

  /* ── 空状态 ── */
  .empty { text-align: center; color: var(--sub); padding: 60px; font-size: 15px; }

  /* ── 加载 ── */
  .loading {
    display: flex; align-items: center; justify-content: center;
    height: 300px; flex-direction: column; gap: 12px;
  }
  .spinner {
    width: 40px; height: 40px; border: 4px solid var(--border);
    border-top-color: var(--primary); border-radius: 50%;
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── 响应式 ── */
  @media (max-width: 900px) {
    .overview-row { grid-template-columns: 1fr 1fr; }
    .chart-row, .chart-row.three, .wc-row { grid-template-columns: 1fr; }
    .main, .tab-bar, .header { padding-left: 16px; padding-right: 16px; }
  }

  .footer {
    text-align: center; padding: 20px;
    color: var(--sub); font-size: 12px;
    border-top: 1px solid var(--border);
  }

  /* ── Debug 信息 ── */
  .debug-info {
    background: #fff3cd; border: 1px solid #ffc107; border-radius: 8px;
    padding: 12px 16px; margin-bottom: 16px; font-size: 12px; color: #856404;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>🎯 言之有品 · 评论智能分析大屏</h1>
    <p>AI驱动 · 真实用户声音 · 数据驱动决策</p>
  </div>
  <div class="header-right">
    <div id="updateTime">加载中...</div>
    <div style="margin-top:4px" id="dataSource">数据来源：检测中...</div>
  </div>
</div>

<div class="tab-bar" id="tabBar">
  <div class="loading"><div class="spinner"></div><span>正在读取数据...</span></div>
</div>

<div class="main" id="mainContent">
</div>

<div class="footer">© 言之有品 · 评论分析平台 | 让每一条评论都发挥价值</div>

<script>
// ══════════════════════════════════════════════
//  全局数据
// ══════════════════════════════════════════════
let allData   = [];
let curIdx    = 0;
let chartRefs = {};
let dataSource = '未知';

// ══════════════════════════════════════════════
//  URL 参数读取
// ══════════════════════════════════════════════
function getQueryParams() {
  const params = new URLSearchParams(window.location.search);
  return {
    results: params.get('results'),  // JSON格式的结果
    job_id: params.get('job_id'),    // 异步任务ID
    api_url: params.get('api_url'),  // API地址
  };
}

  
// ══════════════════════════════════════════════
//  读取数据（多个源）
// ══════════════════════════════════════════════
async function loadData() {
  try {
    const urlParams = getQueryParams();
    
    console.log('🔍 URL参数:', {
      job_id: urlParams.job_id,
      api_url: urlParams.api_url,
      results: urlParams.results ? '有' : '无'
    });
    
    // ✅ 优先级1：URL参数中直接传递了 results JSON
    if (urlParams.results) {
      console.log('✅ 从 URL 参数读取数据');
      try {
        allData = JSON.parse(decodeURIComponent(urlParams.results));
        dataSource = '来自扣子 - URL参数直传';
        init();
        return;
      } catch(e) {
        console.error('❌ URL参数JSON解析失败:', e);
      }
    }
    
    // ✅ 优先级2：通过 job_id 异步轮询获取结果
    if (urlParams.job_id) {
      console.log(`✅ 开始轮询任务: ${urlParams.job_id}`);
      dataSource = '来自扣子 - 异步轮询';
      const success = await pollJobResult(
        urlParams.job_id, 
        urlParams.api_url || 'https://yanzhi-youpin.onrender.com'
      );
      if (success) return;
    }
    
    // ✅ 优先级3：尝试读取最新结果
    console.log('✅ 尝试读取最新分析结果');
    const res = await fetch('/analyze/latest');
    const data = await res.json();
    
    if (data.success && data.results) {
      allData = data.results;
      dataSource = '最新分析结果';
      init();
      return;
    }
    
    // ✅ 优先级4：本地 JSON 文件（仅测试）
    console.log('✅ 尝试读取本地 JSON 文件');
    const localRes = await fetch('./结构化分析结果.json');
    if (localRes.ok) {
      allData = await localRes.json();
      dataSource = '本地 JSON 文件';
      init();
      return;
    }
    
    showError('无法获取任何分析数据');
    
  } catch(e) {
    console.error('❌ 加载数据异常:', e);
    showError(e.message);
  }
}

// ══════════════════════════════════════════════
//  异步轮询获取结果 - 改进版
// ══════════════════════════════════════════════
async function pollJobResult(jobId, apiUrl) {
  const maxRetries = 300;  // 5分钟（1秒轮询一次）
  let retries = 0;
  
  // 显示加载状态
  document.getElementById('tabBar').innerHTML = `
    <div class="loading">
      <div class="spinner"></div>
      <span>📊 正在轮询分析结果 (${jobId})...</span>
    </div>
  `;
  
  return new Promise(async (resolve) => {
    const poll = async () => {
      try {
        const url = `${apiUrl}/analyze/result/${jobId}`;
        console.log(`轮询 (${retries}/${maxRetries}):`, url);
        
        const res = await fetch(url);
        const data = await res.json();
        
        // ✅ 成功：获取到结果
        if (data.success && data.results) {
          console.log('✅ 任务完成，获取结果:', data.results);
          allData = data.results;
          init();
          resolve(true);
          return;
        }
        
        // 处理中：显示进度
        if (data.status === 'processing') {
          const progress = data.progress || 0;
          const product = data.current_product || '...';
          console.log(`⏳ 处理中... ${progress}% (${product})`);
          
          document.getElementById('tabBar').innerHTML = `
            <div class="loading">
              <div class="spinner"></div>
              <span>⏳ 正在处理: ${product} (${progress}%)</span>
            </div>
          `;
          
          retries++;
          if (retries < maxRetries) {
            setTimeout(poll, 1000);  // 1秒轮询一次
          } else {
            showError('❌ 任务超时（5分钟未完成）');
            resolve(false);
          }
          return;
        }
        
        // 失败
        if (data.status === 'failed') {
          console.error('❌ 任务失败:', data.error);
          showError(`❌ 分析失败: ${data.error}`);
          resolve(false);
          return;
        }
        
        // 未知状态
        console.warn('⚠️ 未知状态:', data);
        retries++;
        if (retries < maxRetries) {
          setTimeout(poll, 1000);
        } else {
          showError('任务状态未知，请重试');
          resolve(false);
        }
        
      } catch(e) {
        console.error('❌ 轮询异常:', e);
        retries++;
        
        if (retries < maxRetries) {
          console.log(`⚠️ 网络异常，${1}秒后重试...`);
          setTimeout(poll, 1000);
        } else {
          showError('❌ 网络连接异常');
          resolve(false);
        }
      }
    };
    
    // 立即开始轮询
    await poll();
  });
}

// ══════════════════════════════════════════════
//  错误提示
// ══════════════════════════════════════════════
function showError(message) {
  document.getElementById('tabBar').innerHTML =
    `<div class="empty">
      <p>❌ ${message}</p>
      <p style="margin-top:16px;font-size:12px;color:#aaa">
        方式1：通过 API 端点 /analyze 进行分析后查看结果<br>
        方式2：确认 <b>结构化分析结果.json</b> 存在<br>
        方式3：使用 URL 参数直接传递数据<br>
        例如：?results=${encodeURIComponent('[]')}
      </p>
    </div>`;
}

// ══════════════════════════════════════════════
//  初始化 Tab
// ══════════════════════════════════════════════
function init() {
  console.log('✅ 初始化大屏，数据条数:', allData.length);
  
  document.getElementById('updateTime').textContent =
    '分析时间：' + new Date().toLocaleString('zh-CN');
  document.getElementById('dataSource').textContent = `数据来源：${dataSource}`;

  const bar = document.getElementById('tabBar');
  bar.innerHTML = '';

  if (!allData || allData.length === 0) {
    showError('没有获取到分析数据');
    return;
  }

  allData.forEach((p, i) => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (i === 0 ? ' active' : '');
    btn.textContent = p.product_name || '未知产品';
    btn.onclick = () => switchTab(i);
    bar.appendChild(btn);
  });

  renderProduct(0);
}

function switchTab(idx) {
  curIdx = idx;
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', i === idx);
  });
  Object.values(chartRefs).forEach(c => { try { c.destroy(); } catch(e){} });
  chartRefs = {};
  renderProduct(idx);
}

// ══════════════════════════════════════════════
//  渲染单个产品
// ══════════════════════════════════════════════
function renderProduct(idx) {
  const d   = allData[idx];
  const mc  = document.getElementById('mainContent');

  // 计算统计数字
  const catDist  = d.category_distribution || {};
  const total    = d.total_reviews || 0;
  const goodCnt  = catDist['有效好评']  || 0;
  const badCnt   = catDist['有效差评']  || 0;
  const fakeCnt  = total - goodCnt - badCnt;
  const goodRate = total > 0 ? ((goodCnt / total) * 100).toFixed(1) : 0;

  mc.innerHTML = `
    <!-- 概览卡片 -->
    <div class="overview-row">
      <div class="ov-card">
        <div class="label">📊 总评论数</div>
        <div class="value">${total}</div>
        <div class="unit">条</div>
      </div>
      <div class="ov-card green">
        <div class="label">✅ 有效好评</div>
        <div class="value">${goodCnt}</div>
        <div class="unit">好评率 ${goodRate}%</div>
      </div>
      <div class="ov-card red">
        <div class="label">❌ 有效差评</div>
        <div class="value">${badCnt}</div>
        <div class="unit">差评率 ${total>0?((badCnt/total)*100).toFixed(1):0}%</div>
      </div>
      <div class="ov-card yellow">
        <div class="label">🚫 过滤/无效</div>
        <div class="value">${fakeCnt}</div>
        <div class="unit">占比 ${total>0?((fakeCnt/total)*100).toFixed(1):0}%</div>
      </div>
    </div>

    <!-- 图表行1 -->
    <div class="chart-row">
      <div class="card">
        <h3>📈 评论分类分布</h3>
        <div class="chart-wrap"><canvas id="catChart"></canvas></div>
      </div>
      <div class="card">
        <h3>📐 用户关注维度 TOP</h3>
        <div class="chart-wrap-tall"><canvas id="aspectChart"></canvas></div>
      </div>
    </div>

    <!-- 词云图 -->
    <div class="wc-row">
      <div class="wc-img-wrap">
        <h3>💙 好评词云</h3>
        <div id="wcGoodWrap"></div>
      </div>
      <div class="wc-img-wrap">
        <h3>❤️ 差评词云</h3>
        <div id="wcBadWrap"></div>
      </div>
    </div>

    <!-- 关键词气泡行 -->
    <div class="chart-row">
      <div class="card">
        <h3>💚 买家夸的关键词</h3>
        <div id="goodKW" class="kw-cloud"></div>
      </div>
      <div class="card">
        <h3>🔴 买家骂的关键词</h3>
        <div id="badKW" class="kw-cloud"></div>
      </div>
    </div>

    <!-- AI建议 -->
    <div class="card" style="margin-bottom:0">
      <h3>📋 给您的建议报告</h3>
      <div class="suggestion-box" id="suggestionBox"></div>
    </div>
  `;

  // 渲染各区块
  renderCatChart(catDist);
  renderAspectChart(d.aspect_mention_count || {});
  renderKeywords(d.good_keywords || '', 'goodKW', 'kw-good');
  renderKeywords(d.bad_keywords  || '', 'badKW',  'kw-bad');
  renderSuggestion(d.suggestion || '暂无建议');
  renderWordcloudImages(d);
}

// ── 分类饼图 ──────────────────────────────────
function renderCatChart(catDist) {
  const labels = Object.keys(catDist);
  const values = Object.values(catDist);
  const total  = values.reduce((a, b) => a + b, 0);

  const paletteMap = {
    '有效好评':   '#84c3b7',
    '有效差评':   '#f57c6e',
    '刷评':       '#f2b56f',
    '恶意差评':   '#F5C6C3',
    '无效评论':   '#D4D8F1',
    '硬过滤_默认文案': '#C8E5E4',
    'AI过滤':     '#E3E2F0',
  };
  const fallbacks = ['#b8aeeb','#fae69e','#88d8db','#71b7ed','#f2a7da','#EAC8DF'];
  let fi = 0;
  const colors = labels.map(l => paletteMap[l] || fallbacks[fi++ % fallbacks.length]);

  const ctx = document.getElementById('catChart').getContext('2d');
  chartRefs.cat = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels,
      datasets: [{
        data: values,
        backgroundColor: colors,
        borderWidth: 3,
        borderColor: '#fff',
        hoverOffset: 6
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: {
          position: 'right',
          labels: { font: { size: 12 }, padding: 14, color: '#4a5568' }
        },
        tooltip: {
          callbacks: {
            label: ctx => ` ${ctx.label}: ${ctx.parsed} 条 (${((ctx.parsed / total) * 100).toFixed(1)}%)`
          }
        },
        datalabels: {
          color: '#fff',
          font: { size: 12, weight: 'bold' },
          formatter: (value) => {
            const pct = ((value / total) * 100).toFixed(1);
            return pct < 8 ? '' : `${pct}%`;
          }
        }
      }
    },
    plugins: [ChartDataLabels]
  });
}

// ── 维度横向柱图 ──────────────────────────────
function renderAspectChart(aspectData) {
  const sorted = Object.entries(aspectData).sort((a, b) => b[1] - a[1]);
  const labels = sorted.map(x => x[0]);
  const values = sorted.map(x => x[1]);

  const barPalette = [
    '#9DCDE1','#AFD8E4','#b8aeeb','#84c3b7',
    '#88d8db','#71b7ed','#f2a7da','#EAC8DF',
    '#fae69e','#f2b56f'
  ];
  const bgColors = labels.map((_, i) => barPalette[i % barPalette.length]);

  const ctx = document.getElementById('aspectChart').getContext('2d');
  chartRefs.aspect = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        label: '提及次数',
        data: values,
        backgroundColor: bgColors,
        borderRadius: 8,
        borderSkipped: false,
      }]
    },
    options: {
      indexAxis: 'y',
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        datalabels: {
          anchor: 'end',
          align: 'end',
          color: '#4a5568',
          font: { size: 12, weight: 'bold' },
          formatter: value => `${value} 次`
        }
      },
      scales: {
        x: {
          beginAtZero: true,
          grid: { color: '#f0f0f0' },
          ticks: { color: '#718096' }
        },
        y: {
          grid: { display: false },
          ticks: { font: { size: 12 }, color: '#4a5568' }
        }
      },
      layout: {
        padding: { right: 20 }
      }
    },
    plugins: [ChartDataLabels]
  });
}

// ── 关键词气泡 ────────────────────────────────
function renderKeywords(kwStr, containerId, cls) {
  const container = document.getElementById(containerId);
  
  if (!kwStr || kwStr.trim() === '') {
    container.innerHTML = '<span style="color:#aaa;font-size:13px">暂无关键词</span>';
    return;
  }
  
  const keywords = kwStr.split('、')
    .map(w => w.trim())
    .filter(w => w.length > 0)
    .slice(0, 25);
  
  if (keywords.length === 0) {
    container.innerHTML = '<span style="color:#aaa;font-size:13px">暂无关键词</span>';
    return;
  }
  
  container.innerHTML = keywords.map(w => {
    const size = 13 + Math.random() * 4;
    return `<span class="kw-tag ${cls}" style="font-size:${size}px">${w}</span>`;
  }).join('');
}

// ── 词云图片 ──────────────────────────────────
function renderWordcloudImages(productData) {
  ['Good', 'Bad'].forEach(type => {
    const wrap = document.getElementById(`wc${type}Wrap`);
    
    // ✅ 优先使用 URL（新方式）
    const urlKey = type === 'Good' ? 'good_wordcloud_url' : 'bad_wordcloud_url';
    const url = productData[urlKey];
    
    if (url) {
      const img = new Image();
      img.src = url;
      img.alt = type === 'Good' ? '好评词云' : '差评词云';
      img.style.cssText = 'max-width:100%;border-radius:10px;border:1px solid #e2e8f0';
      img.onerror = () => {
        wrap.innerHTML = `<div class="no-img">🖼️ 词云图加载失败<br><small>${url}</small></div>`;
      };
      wrap.innerHTML = '';
      wrap.appendChild(img);
      return;
    }
    
    // 降级：尝试 Base64 (兼容旧版)
    const base64Key = type === 'Good' ? 'good_wordcloud_base64' : 'bad_wordcloud_base64';
    const base64Data = productData[base64Key];
    
    if (base64Data) {
      const img = new Image();
      img.src = `data:image/png;base64,${base64Data}`;
      img.alt = type === 'Good' ? '好评词云' : '差评词云';
      img.style.cssText = 'max-width:100%;border-radius:10px;border:1px solid #e2e8f0';
      img.onerror = () => {
        wrap.innerHTML = `<div class="no-img">🖼️ Base64图片加载失败</div>`;
      };
      wrap.innerHTML = '';
      wrap.appendChild(img);
      return;
    }
    
    wrap.innerHTML = `<div class="no-img">🖼️ 词云图未生成</div>`;
  });
}

// ── AI建议渲染 ────────────────────────────────
function renderSuggestion(text) {
  const box = document.getElementById('suggestionBox');
  const html = text
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  box.innerHTML = html;
}
